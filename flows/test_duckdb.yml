id: test_duckdb
namespace: prod

tasks:
  - id: duckdb_remove_duplicates
    type: io.kestra.plugin.scripts.python.Commands
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    beforeCommands:
      - pip install pandas openpyxl duckdb
    commands:
      - |
        python - <<EOF
        import duckdb
        import pandas as pd
        import os

        db_path = '/app/data/database.duckdb'
        conn = duckdb.connect(db_path)

        # Lire le fichier Excel
        df = pd.read_excel('/app/data/Fichier_erp.xlsx')

        # Créer une table DuckDB depuis le DataFrame
        conn.execute("CREATE TABLE IF NOT EXISTS wine_table AS SELECT * FROM df")

        # Vérifier
        tables = conn.execute("SHOW TABLES").fetchall()
        print("Tables existantes :", tables)


        # Chemin vers le fichier DuckDB
        db_path = '/app/data/database.duckdb'

        if os.path.exists(db_path):
            conn = duckdb.connect(db_path)
            
            # Afficher les tables disponibles
            tables = conn.execute("SHOW TABLES").fetchall()
            print("📋 Tables disponibles :", tables)
            
            # supprimer les doublons sur 'product_id' dans 'wine_table'
            table_name = 'wine_table'
            if (table_name,) in tables:
                conn.execute(f"""
                DELETE FROM {table_name}
                WHERE product_id IN (
                    SELECT product_id
                    FROM {table_name}
                    GROUP BY product_id
                    HAVING COUNT(*) > 1
                )
                """)
                print(f"Doublons supprimés dans la table '{table_name}'")
                
                # Vérifier le nombre de lignes restantes
                count = conn.execute(f"SELECT COUNT(*) FROM {table_name}").fetchone()[0]
                print(f"Nombre de lignes après suppression : {count}")
            else:
                print(f"Table '{table_name}' non trouvée dans la base.")
        else:
            print(f"Fichier DuckDB non trouvé : {db_path}")
        EOF
