id: create_database
namespace: prod
description: Création et initialisation de la base DuckDB

tasks:
  - id: setup_db
    type: io.kestra.plugin.scripts.python.Commands
    namespaceFiles:
      enabled: true
    taskRunner:
      type: io.kestra.plugin.core.runner.Process
    beforeCommands:
      - pip install pandas openpyxl duckdb
    commands:
      - python create_db.py