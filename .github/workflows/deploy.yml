name: Deploy to Kestra

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate flows & scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q pytest duckdb pyyaml

      - name: Run unit tests
        run: python -m pytest -v

      - name: Validate YAML flows
        run: |
          for f in flows/*.yml; do
            python -c "import yaml; yaml.safe_load(open('$f'))" && echo "OK $f" || exit 1
          done

  deploy:
    name: Deploy flows & scripts
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.KESTRA_URL != ''
    steps:
      - uses: actions/checkout@v4

      - name: Deploy flows (create or update)
        env:
          KESTRA_URL: ${{ secrets.KESTRA_URL }}
          KESTRA_AUTH: ${{ secrets.KESTRA_ADMIN_USER }}:${{ secrets.KESTRA_ADMIN_PASSWORD }}
        run: |
          if [ -z "$KESTRA_URL" ]; then
            echo "KESTRA_URL not set — skipping deploy (no server configured)"
            exit 0
          fi
          for f in flows/*.yml; do
            id=$(grep "^id:" "$f" | awk '{print $2}')
            ns=$(grep "^namespace:" "$f" | awk '{print $2}')
            code=$(curl -s -o /dev/null -w "%{http_code}" -u "$KESTRA_AUTH" \
              -X POST "$KESTRA_URL/api/v1/main/flows" \
              -H "Content-Type: application/x-yaml" \
              --data-binary "@$f")
            if [ "$code" = "422" ]; then
              curl -s -o /dev/null -w "%{http_code} updated $f\n" -u "$KESTRA_AUTH" \
                -X PUT "$KESTRA_URL/api/v1/main/flows/$ns/$id" \
                -H "Content-Type: application/x-yaml" \
                --data-binary "@$f"
            else
              echo "$code created $f"
            fi
          done

      - name: Upload namespace files (scripts)
        env:
          KESTRA_URL: ${{ secrets.KESTRA_URL }}
          KESTRA_AUTH: ${{ secrets.KESTRA_ADMIN_USER }}:${{ secrets.KESTRA_ADMIN_PASSWORD }}
        run: |
          if [ -z "$KESTRA_URL" ]; then
            echo "KESTRA_URL not set — skipping deploy (no server configured)"
            exit 0
          fi
          find scripts -name "*.py" | while read f; do
            path="/${f#scripts/}"
            curl -s -o /dev/null -w "%{http_code} $path\n" \
              -u "$KESTRA_AUTH" \
              -X PUT "$KESTRA_URL/api/v1/main/namespaces/prod/files?path=$path" \
              -F "fileContent=@$f"
          done
